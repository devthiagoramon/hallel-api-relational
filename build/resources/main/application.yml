security:
  jwt:
    token:
      expire-length: 2592000000
      expire-coordenador-length: 86400000
spring:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
  application:
    name: hallel-api
  profiles:
    active: dev
  docker:
    compose:
      enabled: false
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false
server:
  port: 8080
springdoc:

  api-docs:
    path: "/v3/api-docs"
  swagger-ui:
    path: "/swagger-ui.html"
    enabled: true
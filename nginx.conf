server {
    # Ouve na porta 80 para tráfego HTTP
    listen 80;
    server_name api.comunidadecatolicahallel.com.br;

    # Redireciona todo o tráfego HTTP para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Rota para validação do Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    # Ouve na porta 443 para tráfego seguro HTTPS
    listen 443 ssl;
    server_name api.comunidadecatolicahallel.com.br;

    # Caminhos para os certificados SSL (que o Certbot criará)
    ssl_certificate /etc/letsencrypt/live/api.comunidadecatolicahallel.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.comunidadecatolicahallel.com.br/privkey.pem;

    # Configurações de segurança SSL
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        # A linha mais importante: encaminha o tráfego para o contêiner da API!
        # Usamos o nome do serviço definido no docker-compose.yml ('hallel-api')
        proxy_pass http://hallel-api:8080;

        # Cabeçalhos recomendados para um proxy reverso
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
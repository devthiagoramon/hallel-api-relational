 # Bloco do servidor para tráfego HTTP (porta 80)
 server {
     # Ouve na porta 80 para tráfego não seguro
     listen 80;

     # Responde para o seu subdomínio
     server_name api.comunidadecatolicahallel.com.br;

     # Rota especial para que o Certbot (Let's Encrypt) possa validar e renovar o certificado.
     # Ele precisa ser acessível via HTTP.
     location /.well-known/acme-challenge/ {
         root /var/www/certbot;
     }

     # Para todas as outras requisições na porta 80, redireciona permanentemente para HTTPS.
     location / {
         return 301 https://$host$request_uri;
     }
 }

 # Bloco do servidor para tráfego HTTPS (porta 443)
 server {
     # Ouve na porta 443 para tráfego seguro SSL/TLS
     listen 443 ssl;
     server_name api.comunidadecatolicahallel.com.br;

     # --- Configuração do Certificado SSL ---
     # O Certbot gerencia e preenche estes caminhos automaticamente.
     ssl_certificate /etc/letsencrypt/live/api.comunidadecatolicahallel.com.br/fullchain.pem;
     ssl_certificate_key /etc/letsencrypt/live/api.comunidadecatolicahallel.com.br/privkey.pem;

     # Arquivos de configuração de segurança SSL recomendados, gerados pelo Certbot.
     include /etc/letsencrypt/options-ssl-nginx.conf;
     ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;


     # --- Configuração do Proxy Reverso ---
     location / {
         # A linha mais importante: encaminha a requisição para o contêiner da sua API,
         # usando o nome do serviço 'hallel-api' definido no docker-compose.yml.
         proxy_pass http://hallel-api:8080;

         # Cabeçalhos recomendados para que sua aplicação Spring Boot
         # receba as informações corretas sobre o cliente original.
         proxy_set_header Host $host;
         proxy_set_header X-Real-IP $remote_addr;
         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
         proxy_set_header X-Forwarded-Proto $scheme;
     }
 }
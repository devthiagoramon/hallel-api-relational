
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/hallel-db
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: root

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  devtools:
    restart:
      enabled: false

  server:
    address: 0.0.0.0
    port: 8080
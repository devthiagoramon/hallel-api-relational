<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body {
            font-family: 'Helvetica Neue', 'Helvetica', Arial, sans-serif;
            color: #333;
        }
        .container {
            width: 100%;
            margin: 0 auto;
            border: 1px solid #eee;
            padding: 30px;
        }
        .header {
            text-align: center;
            border-bottom: 1px solid #ccc;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        h1 {
            margin: 0;
            font-size: 24px;
        }
        .details {
            margin-top: 20px;
        }
        .details-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        .details-item strong {
            font-weight: 600;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Comprovante de Pagamento</h1>
    </div>

    <div class="details">
        <div class="details-item">
            <strong>ID da Transação:</strong>
            <span th:text="${payment.getId()}">123456789</span>
        </div>
        <div class="details-item">
            <strong>Data e Hora:</strong>
            <span th:text="${#temporals.format(payment.getDateApproved(), 'dd/MM/yyyy HH:mm:ss')}">03/09/2025 20:22</span>
        </div>
        <div class="details-item">
            <strong>Valor Pago:</strong>
            <span th:text="${#numbers.formatDecimal(payment.getTransactionAmount(), 1, 'POINT', 2, 'COMMA')}">R$ 150,00</span>
        </div>
        <div class="details-item">
            <strong>Status:</strong>
            <span style="font-weight: bold; color: green;" th:text="${payment.getStatus().toUpperCase()}">APROVADO</span>
        </div>
    </div>

    <div class="details" style="margin-top: 30px;">
        <div class="details-item">
            <strong>Pagador:</strong>
            <span th:text="|${user.getName()}|">Nome do Cliente</span>
        </div>
        <div class="details-item">
            <strong>E-mail:</strong>
            <span th:text="${user.getEmail()}">cliente@email.com</span>
        </div>
    </div>

    <div class="footer">
        <p>Este comprovante foi gerado automaticamente. Válido para simples conferência.</p>
    </div>
</div>
</body>
</html>

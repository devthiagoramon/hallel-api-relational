<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:remove="all">Validação de administrador</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
          rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 2rem;
            background-color: #ffffff;


            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .header, .body, .footer {
            width: 100%;
        }

        .body {
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .footer {
            margin-top: 1rem;
        }


        .description {
            margin: 0;
            padding: 0;
            font-size: 16px;
            line-height: 1.5;
        }

        .important-text {
            font-size: 16px;
            font-weight: 500;
            color: #007bff;
        }

        .title {
            font-weight: 500;
            font-size: 24px;
            margin: 0;
        }

        .action-button {
            display: inline-block;
            background-color: #007bff;
            color: #ffffff;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            text-decoration: none;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            -webkit-font-smoothing: antialiased;
            font-family: 'Poppins', sans-serif;
        }

        .action-button:hover {
            background-color: #0056b3;
        }

        .action-button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 class="title">Comunidade Católica Hallel</h1>
    </div>

    <div class="body">
        <p class="description">
            Uma conta de administrador aguarda validação para o e-mail
            <span class="important-text" th:text="${email}">...</span>.
        </p>
    </div>

    <div class="footer">
        <a href="#"
           th:href="@{${url_validate}}"
           onclick="event.preventDefault()"
           class="action-button">
            Validar Conta
        </a>
    </div>
</div>

<script>
    function validateWithFetch(button) {
        const url = button.getAttribute('data-url');

        button.disabled = true;
        button.textContent = 'Validando...';

        // Abre em uma nova aba
        const newWindow = window.open(url, '_blank');

        // Foca na nova janela
        if (newWindow) {
            newWindow.focus();
        }

        // Também faz a requisição para a API
        fetch(url)
            .then(response => {
                if (response.ok) {
                    button.textContent = 'Validado!';
                    button.style.backgroundColor = '#28a745';

                    // Mostra mensagem para o usuário
                    setTimeout(() => {
                        alert('Validação concluída! Você será redirecionado para a área administrativa.');
                    }, 1000);
                } else {
                    throw new Error('Falha na validação');
                }
            })
            .catch(error => {
                console.error('Erro:', error);
                button.textContent = 'Erro ao Validar';
                button.style.backgroundColor = '#dc3545';
                button.disabled = false;
            });
    }

    document.addEventListener('DOMContentLoaded', function() {
        const button = document.querySelector('.action-button');
        // Extrai a URL do Thymeleaf
        const url = button.getAttribute('th:href').replace('th:href=', '').replace(/"/g, '');
        button.setAttribute('data-url', url);

        button.addEventListener('click', function(e) {
            e.preventDefault();
            validateWithFetch(this);
        });
    });
</script>
</body>
</html>

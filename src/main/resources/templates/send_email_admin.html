<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <head>
        <title th:remove="all">Validação de administrador</title>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
              rel="stylesheet">
    </head>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 2rem;
            background-color: #ffffff;


            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .header, .body, .footer {
            width: 100%;
        }

        .body {
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .footer {
            margin-top: 1rem;
        }



        .description {
            margin: 0;
            padding: 0;
            font-size: 16px;
            line-height: 1.5;
        }

        .important-text {
            font-size: 16px;
            font-weight: 500;
            color: #007bff;
        }

        .title {
            font-weight: 500;
            font-size: 24px;
            margin: 0;
        }

        .action-button {
            display: inline-block;
            background-color: #007bff;
            color: #ffffff;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            text-decoration: none;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            -webkit-font-smoothing: antialiased;
            font-family: 'Poppins', sans-serif;
        }

        .action-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 class="title">Comunidade Católica Hallel</h1>
    </div>

    <div class="body">
        <p class="description">
            Uma conta de administrador aguarda validação para o e-mail
            <span class="important-text" th:text="${email}">...</span>.
        </p>
    </div>

    <div class="footer">
        <button type="button"
                class="action-button"
                th:data-url="${url_validate}"
                onclick="window.location.href = this.dataset.url">
            Validar Conta
        </button>
    </div>
</div>
</body>
</html>

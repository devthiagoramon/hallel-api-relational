<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:remove="all">Validação de administrador</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
          rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 2rem;
            background-color: #ffffff;


            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .header, .body, .footer {
            width: 100%;
        }

        .body {
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .footer {
            margin-top: 1rem;
        }


        .description {
            margin: 0;
            padding: 0;
            font-size: 16px;
            line-height: 1.5;
        }

        .important-text {
            font-size: 16px;
            font-weight: 500;
            color: #007bff;
        }

        .title {
            font-weight: 500;
            font-size: 24px;
            margin: 0;
        }

        .action-button {
            display: inline-block;
            background-color: #007bff;
            color: #ffffff;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            text-decoration: none;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            -webkit-font-smoothing: antialiased;
            font-family: 'Poppins', sans-serif;
        }

        .action-button:hover {
            background-color: #0056b3;
        }

        .action-button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 class="title">Comunidade Católica Hallel</h1>
    </div>

    <div class="body">
        <p class="description">
            Uma conta de administrador aguarda validação para o e-mail
            <span class="important-text" th:text="${email}">...</span>.
        </p>
    </div>

    <div class="footer">
        <button type="button"
                class="action-button"
                th:data-url="${url_validate}"
                onclick="validateWithFetch(this)">
            Validar Conta
        </button>
    </div>
</div>


<script>
    function validateWithFetch(button) {
        const url = button.dataset.url;

        // 1. Desabilita o botão e mostra um feedback de carregamento
        button.disabled = true;
        button.textContent = 'Validando...';

        // 2. Executa a requisição GET com fetch
        fetch(url)
            .then(response => {
                // Verifica se a resposta da requisição foi bem-sucedida (status 2xx)
                if (!response.ok) {
                    // Se não foi, lança um erro para ser capturado pelo .catch()
                    throw new Error('Falha na validação. Status: ' + response.status);
                }
                // Se foi sucesso, pode-se opcionalmente processar a resposta aqui,
                // mas para uma simples validação GET, apenas saber que funcionou é o suficiente.
                return response.json(); // ou response.text() se sua API não retornar JSON
            })
            .then(data => {
                // 3. Em caso de SUCESSO, atualiza o botão
                console.log('Validação bem-sucedida:', data);
                button.textContent = 'Validado com Sucesso!';
                button.style.backgroundColor = '#28a745'; // Verde
            })
            .catch(error => {
                // 4. Em caso de ERRO, atualiza o botão e reabilita para nova tentativa
                console.error('Erro na validação:', error);
                button.textContent = 'Erro ao Validar. Tente Novamente.';
                button.style.backgroundColor = '#dc3545'; // Vermelho
                button.disabled = false; // Permite que o usuário tente novamente
            });
    }
</script>
</body>
</html>

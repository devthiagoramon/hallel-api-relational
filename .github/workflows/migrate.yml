name: Run Flyway Migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Apply Flyway Migrations (Supabase)
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run Flyway migrations
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://db.xdkftealcamguolhezss.supabase.co:5432/postgres?sslmode=require
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: ./gradlew flywayMigrate

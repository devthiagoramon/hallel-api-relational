name: Build and Deploy Application to EC2

on:
  push:
    branches:
      - production # O deploy é acionado em push para a branch 'main'

jobs:
  build_and_deploy:
    name: 'Build and Deploy to Production EC2'
    runs-on: ubuntu-latest

    # Define que este job será executado no contexto do ambiente 'production'
    environment:
      name: production
      url: https://api.comunidadecatolicahallel.com.br

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: thiagoramon/hallel-api:latest

      - name: Copia o docker-compose.yml para o servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.SERVER_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.EC2_SSH_PASSWORD }}
          source: "docker-compose.yml"
          target: "/home/ec2-user/hallel-api"

      - name: SSH, Configure and Restart Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SERVER_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.EC2_SSH_PASSWORD }}
          script: |
            mkdir -p /home/ec2-user/hallel-api
            sudo mkdir -p /etc/hallel-api
            
            sudo tee /etc/hallel-api/prod.env > /dev/null <<EOF
            SPRING_PROFILES_ACTIVE=prod
            DB_URL=jdbc:postgresql://${{ vars.DB_URL }}/hallel_db
            DB_USERNAME=${{ vars.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }} 
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            PEPPER_SECRET=${{ secrets.PEPPER_SECRET }}
            FIREBASE_FCM_TOKEN=${{ secrets.FIREBASE_FCM_TOKEN }}
            MERCADOPAGO_ACCESS_TOKEN=${{ secrets.MERCADOPAGO_ACCESS_TOKEN }}
            MERCADOPAGO_NOTIFICATION_URL=${{ secrets.MERCADOPAGO_NOTIFICATION_URL }}
            EOF
            
            cd /home/ec2-user/hallel-api
            docker-compose pull
            docker-compose up -d
